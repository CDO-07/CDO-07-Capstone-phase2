name: slack-notifications

on:
  push:
    branches:
      - '**'
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - closed
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  notify-push:
    name: Notify Slack on push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      DELETED: ${{ github.event.deleted }}
      ACTOR: ${{ github.actor }}
      REPOSITORY: ${{ github.repository }}
      REF_NAME: ${{ github.ref_name }}
      SHA: ${{ github.sha }}
      COMPARE_URL: ${{ github.event.compare }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Send push notification
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SLACK_WEBHOOK_URL}" ]]; then
            echo "::notice title=Slack notification skipped::Repository secret SLACK_WEBHOOK_URL is not configured."
            exit 0
          fi

          if [[ "${DELETED}" == "true" ]]; then
            title="Branch deleted"
            body="*${ACTOR}* deleted branch \`${REF_NAME}\` in \`${REPOSITORY}\`."
          else
            title="Push"
            body="*${ACTOR}* pushed to \`${REF_NAME}\` in \`${REPOSITORY}\`."
          fi

          payload="$(
            jq -n \
              --arg text ":arrow_up: ${title}: ${REPOSITORY}@${REF_NAME}" \
              --arg body "$body" \
              --arg sha "${SHA}" \
              --arg compare "${COMPARE_URL}" \
              --arg workflow "${RUN_URL}" \
              '{
                text: $text,
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: $body
                    }
                  },
                  {
                    type: "context",
                    elements: [
                      {
                        type: "mrkdwn",
                        text: ("Commit: `" + $sha[0:7] + "`")
                      },
                      {
                        type: "mrkdwn",
                        text: ("<" + $compare + "|Compare>")
                      },
                      {
                        type: "mrkdwn",
                        text: ("<" + $workflow + "|Workflow>")
                      }
                    ]
                  }
                ]
              }'
          )"

          curl --fail --show-error --silent \
            --request POST \
            --header 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

  notify-pr-open:
    name: Notify Slack on pull request
    if: github.event_name == 'pull_request_target' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      PR_ACTION: ${{ github.event.action }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_ACTOR: ${{ github.actor }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BASE: ${{ github.event.pull_request.base.ref }}
      PR_HEAD: ${{ github.event.pull_request.head.ref }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Send pull request notification
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SLACK_WEBHOOK_URL}" ]]; then
            echo "::notice title=Slack notification skipped::Repository secret SLACK_WEBHOOK_URL is not configured."
            exit 0
          fi

          payload="$(
            jq -n \
              --arg text ":pull_request: Pull request ${PR_ACTION}: #${PR_NUMBER}" \
              --arg title "${PR_TITLE}" \
              --arg actor "${PR_ACTOR}" \
              --arg repo "${REPOSITORY}" \
              --arg number "${PR_NUMBER}" \
              --arg base "${PR_BASE}" \
              --arg head "${PR_HEAD}" \
              --arg url "${PR_URL}" \
              --arg workflow "${RUN_URL}" \
              '{
                text: $text,
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: ("*Pull request " + $number + " opened/updated* in `" + $repo + "`\n*" + $title + "*")
                    }
                  },
                  {
                    type: "section",
                    fields: [
                      {
                        type: "mrkdwn",
                        text: ("*Author:*\n" + $actor)
                      },
                      {
                        type: "mrkdwn",
                        text: ("*Branch:*\n`" + $head + "` → `" + $base + "`")
                      }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      {
                        type: "mrkdwn",
                        text: ("<" + $url + "|Open PR>")
                      },
                      {
                        type: "mrkdwn",
                        text: ("<" + $workflow + "|Workflow>")
                      }
                    ]
                  }
                ]
              }'
          )"

          curl --fail --show-error --silent \
            --request POST \
            --header 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"

  notify-pr-merged:
    name: Notify Slack on merge
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_ACTOR: ${{ github.actor }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_BASE: ${{ github.event.pull_request.base.ref }}
      PR_HEAD: ${{ github.event.pull_request.head.ref }}
      MERGE_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Send merge notification
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${SLACK_WEBHOOK_URL}" ]]; then
            echo "::notice title=Slack notification skipped::Repository secret SLACK_WEBHOOK_URL is not configured."
            exit 0
          fi

          payload="$(
            jq -n \
              --arg text ":white_check_mark: Pull request merged: #${PR_NUMBER}" \
              --arg title "${PR_TITLE}" \
              --arg actor "${PR_ACTOR}" \
              --arg repo "${REPOSITORY}" \
              --arg number "${PR_NUMBER}" \
              --arg base "${PR_BASE}" \
              --arg head "${PR_HEAD}" \
              --arg merge_commit "${MERGE_COMMIT}" \
              --arg url "${PR_URL}" \
              --arg workflow "${RUN_URL}" \
              '{
                text: $text,
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: ("*Pull request " + $number + " merged* into `" + $base + "` in `" + $repo + "`\n*" + $title + "*")
                    }
                  },
                  {
                    type: "section",
                    fields: [
                      {
                        type: "mrkdwn",
                        text: ("*Merged by:*\n" + $actor)
                      },
                      {
                        type: "mrkdwn",
                        text: ("*Branch:*\n`" + $head + "` → `" + $base + "`")
                      },
                      {
                        type: "mrkdwn",
                        text: ("*Merge commit:*\n`" + $merge_commit[0:7] + "`")
                      }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      {
                        type: "mrkdwn",
                        text: ("<" + $url + "|Open PR>")
                      },
                      {
                        type: "mrkdwn",
                        text: ("<" + $workflow + "|Workflow>")
                      }
                    ]
                  }
                ]
              }'
          )"

          curl --fail --show-error --silent \
            --request POST \
            --header 'Content-type: application/json' \
            --data "$payload" \
            "$SLACK_WEBHOOK_URL"
